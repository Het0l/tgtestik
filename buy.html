<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Market | Покупка успешна</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #312d3d, #1e3c72);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #a3d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            transition: all 0.25s;
        }

        nav a:hover {
            background: rgba(74,158,255,0.22);
            color: #ffffff;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 90px;
            color: #4a9eff;
            margin-bottom: 25px;
            animation: pulse 2.2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }

        h2 {
            font-size: 38px;
            font-weight: 700;
            margin: 0 0 20px;
            background: linear-gradient(to right, #fff, #a3d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 19px;
            color: rgba(255,255,255,0.75);
            margin: 0 0 35px;
            line-height: 1.45;
        }

        .highlight {
            color: #4a9eff;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.28s;
            cursor: pointer;
        }

        .btn-primary {
            background: #4a9eff;
            color: white;
            border: none;
            box-shadow: 0 6px 20px rgba(74,158,255,0.35);
        }

        .btn-primary:hover {
            background: #2d8cff;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(74,158,255,0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.14);
        }

        .btn-secondary:hover {
            background: rgba(74,158,255,0.22);
            border-color: rgba(74,158,255,0.4);
            color: white;
        }

    </style>
</head>
<body>

<div class="confetti" id="confetti"></div>

<header>
    <div class="header-content">
        <div class="logo">
            <h1>Aura Market</h1>
        </div>
        <nav>
            <a href="index.html">На главную</a>
        </nav>
    </div>
</header>

<main>
    <div class="success-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>

        <h2>Покупка успешна!</h2>

        <p class="subtitle">
            Скин успешно <span class="highlight">приобретён</span>.<br>
            Сейчас он уже летит в ваш инвентарь Steam.
        </p>

        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-shopping-bag" style="margin-right:10px;"></i>
                Купить ещё
            </a>
            <a href="profil.html" class="btn btn-secondary">
                <i class="fas fa-user" style="margin-right:10px;"></i>
                Мой профиль
            </a>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    // Запуск конфетти при загрузке страницы
    setTimeout(() => {
        confetti({
            particleCount: 120,
            spread: 80,
            origin: { y: 0.6 },
            colors: ['#66bb6a', '#81c784', '#a5d6a7', '#ffffff', '#4caf50']
        });
    }, 400);

    // Повтор через 1.2 секунды для эффекта
    setTimeout(() => {
        confetti({
            particleCount: 80,
            spread: 100,
            origin: { y: 0.7 }
        });
    }, 1200);
</script>

</body>
</html>
