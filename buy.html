<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Market - Покупка успешна</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ========== ХЕДЕР ========== */
        header {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
            height: 50px;
            box-sizing: border-box;
        }
        .header-content > a {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 0;
            margin: 0;
            line-height: 1;
            height: 100%;
        }
        .logo {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            line-height: 1;
            display: flex;
            align-items: center;
        }
        .hamburger {
            font-size: 1.9rem;
            color: white;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.3s;
            margin-left: 15px;
        }
        .hamburger:hover {
            background: rgba(255,255,255,0.15);
        }
        label.hamburger {
            display: flex !important;
            align-items: center;
            margin: 0;
            line-height: 1;
            height: 100%;
        }
        .menu-toggle { display: none; }
        .mobile-menu {
            position: absolute;
            top: 100%;
            right: 15px;
            background: rgba(25, 28, 55, 0.98);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 12px;
            width: 260px;
            padding: 15px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px);
            transition: all 0.35s ease;
        }
        .menu-toggle:checked ~ .mobile-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .mobile-menu a {
            display: block;
            padding: 14px 22px;
            color: #e0e0ff;
            text-decoration: none;
            font-size: 1.08rem;
        }
        .mobile-menu a:hover {
            background: rgba(0,212,255,0.15);
            color: white;
        }
        .mobile-menu hr {
            border-color: rgba(255,255,255,0.12);
            margin: 10px 0;
        }
        .select-group {
            padding: 10px 22px;
            display: flex;
            gap: 12px;
        }
        .select-group select {
            flex: 1;
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1rem;
        }

        /* ========== КОНТЕНТ ========== */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .success-card {
            background: #0f3460;
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 90px;
            color: #00d4ff;
            margin-bottom: 25px;
            animation: pulse 2.2s infinite ease-in-out;
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }

        .success-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 20px;
            background: linear-gradient(90deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #aac8e4;
            margin: 0 0 30px;
            line-height: 1.6;
        }

        .highlight {
            color: #00d4ff;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .btn-success-primary {
            display: block;
            padding: 15px 32px;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 10px;
            background: #00d4ff;
            color: #000;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(0,212,255,0.3);
        }
        .btn-success-primary:hover {
            background: #00b8d9;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,212,255,0.45);
            text-decoration: none;
        }

        .btn-success-secondary {
            display: block;
            padding: 15px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .btn-success-secondary:hover {
            background: rgba(0,212,255,0.12);
            border-color: rgba(0,212,255,0.4);
            color: white;
            transform: translateY(-2px);
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <a href="index.html"><div class="logo">Aura Market</div></a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <i class="fas fa-bars"></i>
        </label>

        <div class="mobile-menu">
            <a href="Counter-Strike.html"><i class="fas fa-crosshairs"></i> CS 2</a>
            <a href="Dota.html"><i class="fas fa-crown"></i> Dota 2</a>
            <a href="SMI.html"><i class="fas fa-newspaper"></i> Новости</a>
            <a href="profil.html"><i class="fas fa-user"></i> Перейти в профиль</a>
            <hr>
            <div class="select-group">
                <select id="currency">
                    <option value="USD">USD $</option>
                    <option value="RUB">RUB ₽</option>
                    <option value="EUR">EUR €</option>
                </select>
                <select id="language">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="success-card">
        <i class="fas fa-check-circle success-icon"></i>

        <h2 class="success-title" data-ru="Покупка успешна!" data-en="Purchase Successful!">Покупка успешна!</h2>

        <p class="subtitle">
            <span data-ru="Скин успешно" data-en="Your skin has been">Скин успешно</span>
            <span class="highlight" data-ru="приобретён" data-en="purchased">приобретён</span>.<br>
            <span data-ru="Сейчас он уже летит в ваш инвентарь Steam." data-en="It's on its way to your Steam inventory.">Сейчас он уже летит в ваш инвентарь Steam.</span>
        </p>

        <div class="btn-group">
            <a href="index.html" class="btn-success-primary">
                <i class="fas fa-shopping-bag" style="margin-right:10px;"></i>
                <span data-ru="Купить ещё" data-en="Buy more">Купить ещё</span>
            </a>
            <a href="profil.html" class="btn-success-secondary">
                <i class="fas fa-user" style="margin-right:10px;"></i>
                <span data-ru="Мой профиль" data-en="My Profile">Мой профиль</span>
            </a>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    // Конфетти
    setTimeout(() => {
        confetti({
            particleCount: 120,
            spread: 80,
            origin: { y: 0.6 },
            colors: ['#00d4ff', '#4a9eff', '#ffffff', '#66bb6a', '#a3d5ff']
        });
    }, 400);

    setTimeout(() => {
        confetti({
            particleCount: 80,
            spread: 100,
            origin: { y: 0.7 }
        });
    }, 1200);

    // ========== ЯЗЫК / ВАЛЮТА ==========
    let currentCurrency = localStorage.getItem('currency') || 'USD';
    let currentLang = localStorage.getItem('language') || 'ru';

    function switchLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-ru]').forEach(el => {
            const attr = lang === 'ru' ? 'ru' : 'en';
            if (el.hasAttribute(`data-${attr}`)) el.textContent = el.getAttribute(`data-${attr}`);
        });
    }

    function initPage() {
        const curSelect = document.getElementById('currency');
        const langSelect = document.getElementById('language');
        if (curSelect) curSelect.value = currentCurrency;
        if (langSelect) langSelect.value = currentLang;
        switchLanguage(currentLang);
    }

    document.addEventListener('DOMContentLoaded', () => {
        initPage();
        document.getElementById('currency')?.addEventListener('change', e => {
            currentCurrency = e.target.value;
            localStorage.setItem('currency', currentCurrency);
        });
        document.getElementById('language')?.addEventListener('change', e => {
            switchLanguage(e.target.value);
        });
    });
</script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
</body>
</html>
