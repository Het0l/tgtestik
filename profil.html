<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>User Info</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      font-size: 17px;
      line-height: 1.5;
      background: linear-gradient(to right, #312d3d, #1e3c72);
      color: white;
      min-height: 100vh;
      padding-bottom: 50px;
      overflow-x: hidden;
    }
    h2 {
      margin: 8px 0 24px 0;
      font-size: 24px;
    }
    .field {
      margin: 14px 0;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .label {
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      min-width: 110px;
    }
    .value {
      color: white;
    }
    .photo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .not-available {
      color: rgba(255,255,255,0.5);
      font-style: italic;
      text-align: center;
      margin: 20px 0;
    }
    #error {
      color: #ff6b6b;
      font-weight: bold;
      margin-top: 20px;
      text-align: center;
    }
    header {
      margin-bottom: 20px;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(255,255,255,0.12);
    }
    nav a:hover {
      background: rgba(255,255,255,0.22);
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <h1>Aura Market</h1>
        </div>
        <nav>
          <ul>
            <li><a href="index.html">Назад</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <h2>Информация о тебе</h2>

  <div id="photo-container"></div>

  <div class="field">
    <span class="label">ID:</span>
    <span class="value" id="user-id">—</span>
  </div>

  <div class="field">
    <span class="label">Имя:</span>
    <span class="value" id="first-name">—</span>
  </div>

  <!-- Фамилия будет добавлена динамически только если есть -->

  <div class="field" id="username-field">
    <span class="label">Username:</span>
    <span class="value" id="username">—</span>
  </div>

  <div id="error"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    try {
      const user = tg.initDataUnsafe?.user;

      if (!user || !user.id) {
        document.getElementById('error').textContent =
          "Данные пользователя недоступны.\nMini App должен быть запущен через бота.";
        throw new Error("Нет объекта user");
      }

      // ID и имя — всегда показываем
      document.getElementById('user-id').textContent = user.id;
      document.getElementById('first-name').textContent = user.first_name || "—";

      // Username
      document.getElementById('username').textContent =
        user.username ? `@${user.username}` : "—";

      // Фамилия — только если есть и не пустая
      if (user.last_name && user.last_name.trim() !== "") {
        const lastNameField = document.createElement('div');
        lastNameField.className = 'field';
        lastNameField.innerHTML = `
          <span class="label">Фамилия:</span>
          <span class="value">${user.last_name}</span>
        `;
        // Вставляем после блока с именем
        document.getElementById('first-name').parentElement.after(lastNameField);
      }

      // Фото
      if (user.photo_url) {
        const img = document.createElement('img');
        img.src = user.photo_url;
        img.className = 'photo';
        img.alt = "Аватар";
        img.onerror = () => {
          img.src = ''; // или можно поставить заглушку
          document.getElementById('photo-container').innerHTML =
            '<div class="not-available">Не удалось загрузить фото</div>';
        };
        document.getElementById('photo-container').appendChild(img);
      } else {
        document.getElementById('photo-container').innerHTML =
          '<div class="not-available">Фото отсутствует</div>';
      }

    } catch (err) {
      console.error(err);
      document.getElementById('error').textContent =
        "Ошибка: " + err.message;
    }
  </script>
</body>
</html>
